<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園環景導覽</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 強制放大地圖上的點點，並讓裡面的數字置中 */
        .custom-dot {
            width: 40px !important;  /* 點點變大 */
            height: 40px !important; /* 點點變大 */
            border-radius: 50% !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            color: #ffffff !important;
            font-size: 20px !important;
            font-weight: 900 !important;
            border: 3px solid white !important; /* 加上白邊更明顯 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5) !important;
            text-shadow: 0px 0px 4px rgba(0,0,0,0.8); /* 確保數字在任何背景色都清楚 */
        }

        /* 標籤文字也稍微放大 */
        .custom-label {
            font-size: 16px !important;
            font-weight: bold !important;
            margin-top: 5px !important;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8) !important;
        }

        /* ==========================================
           🌟 圖例面板的專屬設計
           ========================================== */
        #legend-panel {
            position: fixed; 
            top: 20px;
            right: 20px; 
            background-color: rgba(30, 30, 30, 0.9); 
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1000; 
            max-height: 85vh; /* 避免名單太長 */
            overflow-y: auto; /* 超過高度可以滾動 */
            width: 240px;
            font-family: sans-serif;
        }

        #legend-panel h3 {
            margin: 0 0 15px 0;
            font-size: 22px;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }

        #legend-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #legend-panel li {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer; 
            transition: color 0.2s ease, transform 0.1s ease;
        }

        #legend-panel li:hover {
            color: #00e5ff; 
            transform: translateX(5px);
        }

        .leg-num {
            display: inline-block;
            background-color: #555; /* 圖例的圓圈底色 */
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            margin-right: 12px;
            font-size: 14px;
            flex-shrink: 0;
            border: 2px solid #ccc;
        }
    </style>
</head>

    function createPinElement(pin) {
      const anchorEl = document.createElement('a');
      anchorEl.className = 'tl-pin';
      anchorEl.href = pin.href;
      anchorEl.target = '_blank';
      anchorEl.rel = 'noopener noreferrer';
      anchorEl.style.left = `${pin.left}%`;
      anchorEl.style.top = `${pin.top}%`;

      if (pin.id) {
        anchorEl.id = pin.id;
      }

      const dotEl = document.createElement('div');
      // 🌟 套用新樣式 custom-dot，並塞入數字
      dotEl.className = `tl-dot ${pin.dotClass || 'blue-dot'} custom-dot`;
      if (pin.num) dotEl.textContent = pin.num; 

      const labelEl = document.createElement('div');
      // 🌟 套用新樣式 custom-label
      labelEl.className = 'tl-label custom-label';
      labelEl.textContent = pin.label;

      anchorEl.append(dotEl, labelEl);
      return anchorEl;
    }
