<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園環景導覽</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="map-viewport">
    <div class="map-container" id="mapContainer">
      <img id="mapImage" class="map-bg" src="map.png" alt="校園地圖" draggable="false" />
    </div>
  </div>

  <script>
    const mapContainerEl = document.getElementById('mapContainer');
    const mapImageEl = document.getElementById('mapImage');

    function createPinElement(pin) {
      const anchorEl = document.createElement('a');
      anchorEl.className = 'tl-pin';
      anchorEl.href = pin.href;
      anchorEl.target = '_blank';
      anchorEl.rel = 'noopener noreferrer';
      anchorEl.style.left = `${pin.left}%`;
      anchorEl.style.top = `${pin.top}%`;

      if (pin.id) anchorEl.id = pin.id;

      const dotEl = document.createElement('div');
      dotEl.className = `tl-dot ${pin.dotClass || 'blue-dot'}`;

      const labelEl = document.createElement('div');
      labelEl.className = 'tl-label';
      labelEl.textContent = pin.label;

      anchorEl.append(dotEl, labelEl);
      return anchorEl;
    }

    async function loadPinsData() {
      try {
        const response = await fetch('./data/pins.json');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const pins = await response.json();
        pins.forEach((pin) => mapContainerEl.appendChild(createPinElement(pin)));
      } catch (error) {
        console.error('載入點位資料失敗：', error);
      }
    }

    let currentScale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    function updateTransform() {
      mapContainerEl.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
    }

    function resetTransform() {
      currentScale = 1;
      translateX = 0;
      translateY = 0;
      updateTransform();
    }

    function resizeMapContainer() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const ratio = mapImageEl.naturalWidth / mapImageEl.naturalHeight;
      if (!ratio || !Number.isFinite(ratio)) return;

      let newW;
      let newH;
      if (w / h > ratio) {
        newH = h;
        newW = newH * ratio;
      } else {
        newW = w;
        newH = newW / ratio;
      }

      mapContainerEl.style.width = `${newW}px`;
      mapContainerEl.style.height = `${newH}px`;
      resetTransform();
    }

    mapImageEl.addEventListener('load', resizeMapContainer);
    if (mapImageEl.complete && mapImageEl.naturalWidth) resizeMapContainer();
    window.addEventListener('resize', resizeMapContainer);

    document.addEventListener('click', function (e) {
      if (!mapContainerEl.contains(e.target)) return;
      if (e.target.closest && e.target.closest('.tl-pin')) return;

      const rect = mapContainerEl.getBoundingClientRect();
      const xScaled = e.clientX - rect.left;
      const yScaled = e.clientY - rect.top;
      const scale = currentScale || 1;
      const xUnscaled = xScaled / scale;
      const yUnscaled = yScaled / scale;
      const w = mapContainerEl.clientWidth || rect.width || 1;
      const h = mapContainerEl.clientHeight || rect.height || 1;

      let dotHalfW = 0;
      let dotHalfH = 0;
      const sampleDot = mapContainerEl.querySelector('.tl-dot');
      if (sampleDot) {
        const dotRect = sampleDot.getBoundingClientRect();
        dotHalfW = (dotRect.width / scale) / 2;
        dotHalfH = (dotRect.height / scale) / 2;
      }

      const leftPct = ((xUnscaled - dotHalfW) / w) * 100;
      const topPct = ((yUnscaled - dotHalfH) / h) * 100;
      alert(`left: ${leftPct.toFixed(2)}%;\ntop: ${topPct.toFixed(2)}%;`);
    });

    mapContainerEl.addEventListener('wheel', function (e) {
      e.preventDefault();
      mapContainerEl.style.transition = 'transform 0.15s ease-out';
      if (e.deltaY < 0) currentScale += 0.1;
      else currentScale -= 0.1;
      if (currentScale < 1) currentScale = 1;
      if (currentScale > 3) currentScale = 3;
      if (currentScale === 1) {
        translateX = 0;
        translateY = 0;
      }
      updateTransform();
    }, { passive: false });

    mapContainerEl.addEventListener('mousedown', function (e) {
      if (e.target.closest && e.target.closest('.tl-pin')) return;
      isDragging = true;
      mapContainerEl.style.transition = 'none';
      mapContainerEl.style.cursor = 'grabbing';
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
    });

    window.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      e.preventDefault();
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      updateTransform();
    });

    window.addEventListener('mouseup', function () {
      isDragging = false;
      mapContainerEl.style.cursor = 'grab';
    });

    loadPinsData();
  </script>
</body>
</html>
