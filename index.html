<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園環景導覽 - 蘭潭校區</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 基礎底色 */
            background-color: #8ECA45; 
            overflow: hidden; 
            font-family: sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #map-container {
            position: absolute;
            transform-origin: 0 0; 
        }

        #map-image {
            display: block;
            cursor: grab; 
        }
        #map-image:active {
            cursor: grabbing; 
        }

        /* 🌟 點點外觀設計 */
        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 50px;  
            height: 50px; 
            background-color: white;
            border: 6px solid var(--theme-color, #00e5ff); 
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333; 
            font-size: 24px; 
            font-weight: 900; 
        }

        .hotspot::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%; background-color: var(--theme-color, #00e5ff);
            border-radius: 50%; opacity: 0.5; z-index: -1;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .hotspot::before {
            content: attr(data-name); position: absolute; bottom: 85px; left: 50%;
            transform: translateX(-50%); background-color: rgba(40, 40, 40, 0.95); 
            color: #ffffff; padding: 12px 24px; border-radius: 12px; font-size: 32px; 
            font-weight: bold; white-space: nowrap; opacity: 0; pointer-events: none; 
            transition: opacity 0.2s ease; box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .hotspot:hover::before { opacity: 1; }

        /* ==========================================
           🌟 圖例面板的專屬設計 (向上收合版)
           ========================================== */
        #legend-panel {
            position: fixed; 
            top: 20px;
            right: 20px; 
            background-color: rgba(40, 40, 40, 0.85); 
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100; 
            width: 250px; 
            /* 讓收合動作平滑 */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        /* 向上收合狀態：將整個面板往上推到畫面外 */
        #legend-panel.collapsed {
            transform: translateY(calc(-100% - 30px)); 
            opacity: 0.9;
        }

        /* 收合按鈕 (掛在面板正下方，像抽屜把手) */
      /* 收合按鈕 (掛在面板正下方，像抽屜把手) */
        #toggle-btn {
            position: absolute;
            bottom: -35px; 
            left: 50%;
            transform: translateX(-50%);
            /* 🌟 修正 1：把寬度稍微加大，或者使用 auto 配合 padding */
            width: 90px; 
            height: 35px;
            background: #00e5ff;
            color: #333;
            border: none;
            border-radius: 0 0 10px 10px; /* 下方圓角 */
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            z-index: 101;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            pointer-events: auto;
            
            /* 🌟 修正 2：加入 Flexbox 確保文字絕對置中 */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 🌟 修正 3：強制一行顯示，絕不換行 */
            white-space: nowrap; 
            
            /* 🌟 修正 4：讓文字稍微拉開一點，視覺更舒服 */
            letter-spacing: 2px; 
        }

        #legend-panel h3 { margin: 0 0 15px 0; font-size: 24px; border-bottom: 2px solid #00e5ff; padding-bottom: 10px; text-align: center; letter-spacing: 2px; }
        #legend-list { list-style: none; padding: 0; margin: 0; max-height: 60vh; overflow-y: auto; }
        #legend-panel li { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: color 0.2s ease, transform 0.1s ease; }
        #legend-panel li:hover { color: #00e5ff; transform: translateX(5px); }
        .leg-num { display: inline-block; background-color: #00e5ff; color: #333; width: 28px; height: 28px; border-radius: 50%; text-align: center; line-height: 28px; font-weight: bold; margin-right: 12px; font-size: 14px; flex-shrink: 0; }
    </style>
</head>

        const container = document.getElementById('map-container');
        const mapImage = document.getElementById('map-image');
        const legendList = document.getElementById('legend-list');

        const gateIndex = locations.findIndex(p => p.name === "校門入口");
        if (gateIndex !== -1) {
            const gate = locations[gateIndex];
            locations.forEach(p => {
                const dx = p.x - gate.x;
                const dy = p.y - gate.y;
                p.distance = Math.sqrt(dx * dx + dy * dy);
            });
            locations.sort((a, b) => a.distance - b.distance);
        }

        locations.forEach((loc, index) => {
            loc.num = index + 1; 
            const li = document.createElement('li');
            li.innerHTML = `<span class="leg-num" style="background-color: ${loc.color};">${loc.num}</span> <span class="leg-text">${loc.name}</span>`;
            li.addEventListener('click', (e) => {
                e.stopPropagation();
                if (loc.link) window.open(loc.link, '_blank');
            });
            legendList.appendChild(li);

            const dot = document.createElement('div');
            dot.className = 'hotspot';
            dot.style.left = loc.x + '%';
            dot.style.top = loc.y + '%';
            dot.style.setProperty('--theme-color', loc.color);
            dot.setAttribute('data-name', loc.name);
            dot.textContent = loc.num;

            dot.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (loc.link) window.open(loc.link, '_blank');
            });
            container.appendChild(dot);
        });

        let currentScale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function initMapView() {
            const ratioX = window.innerWidth / mapImage.naturalWidth;
            const ratioY = window.innerHeight / mapImage.naturalHeight;
            currentScale = Math.min(ratioX, ratioY) * 1.05; 
            translateX = (window.innerWidth - (mapImage.naturalWidth * currentScale)) / 2;
            translateY = (window.innerHeight - (mapImage.naturalHeight * currentScale)) / 2;
            updateTransform();
        }

        mapImage.onload = initMapView;
        if(mapImage.complete) initMapView();

        const viewport = document.getElementById('viewport');

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomIntensity = 0.1; 
            const delta = e.deltaY > 0 ? -zoomIntensity : zoomIntensity;
            const mouseX = e.clientX - translateX;
            const mouseY = e.clientY - translateY;
            const newScale = Math.min(Math.max(0.2, currentScale + delta), 4);
            translateX -= mouseX * (newScale / currentScale - 1);
            translateY -= mouseY * (newScale / currentScale - 1);
            currentScale = newScale;
            updateTransform();
        }, { passive: false });

        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.hotspot') || e.target.closest('#legend-panel')) return; 
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mouseleave', () => { isDragging = false; });

        // 🌟 圖例向上收合功能控制
        document.addEventListener("DOMContentLoaded", function() {
            const panel = document.getElementById('legend-panel');
            const toggleBtn = document.getElementById('toggle-btn');
            if (panel && toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    panel.classList.toggle('collapsed');
                    toggleBtn.textContent = panel.classList.contains('collapsed') ? '▼ 展開' : '▲ 收合';
                });
            }
        });
    </script>
