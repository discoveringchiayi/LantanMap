        #viewport { width: 100vw; height: 100vh; position: relative; }
        #map-container { position: absolute; transform-origin: 0 0; }
        #map-image { display: block; cursor: grab; }
        
        /* 🌟 收合式圖例面板設計 */
        #legend-panel {
            position: fixed; top: 20px; right: 20px; 
            background-color: rgba(40, 40, 40, 0.9); 
            color: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100; max-height: 80vh; width: 250px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #legend-panel.collapsed { transform: translateX(230px); opacity: 0.6; }

        #toggle-btn {
            position: absolute; top: 10px; left: -40px;
            width: 35px; height: 35px; background: #00e5ff;
            color: #333; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold; font-size: 18px;
        }

        #legend-panel h3 { margin: 0 0 15px 0; font-size: 20px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 10px; }
        #legend-list { list-style: none; padding: 0; margin: 0; max-height: 60vh; overflow-y: auto; }
        #legend-list li { font-size: 14px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; }
        #legend-list li:hover { color: #00e5ff; }
        
        /* 熱點樣式 */
        .hotspot { position: absolute; transform: translate(-50%, -50%); width: 40px; height: 40px; background-color: white; border: 4px solid var(--theme-color, #00e5ff); border-radius: 50%; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; color: #333; font-weight: 900; }
